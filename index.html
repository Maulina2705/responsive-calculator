<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Responsive Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator">

        <div class="top-bar">

            <h2>Calculator</h2>

            <button id="themeToggle">
                🌙
            </button>

        </div>

        <div class="display">
            <input type="text" id="screen" readonly>
        </div>

        <div class="mode-switch">

            <button id="standardBtn" class="active">
                Standard
            </button>

            <button id="scientificBtn">
                Scientific
            </button>

        </div>

        <div class="history-panel">

            <div class="history-header">
                <h3>History</h3>

                <button id="clearHistory">
                    Clear
                </button>
            </div>

            <div class="history-list">

            </div>

        </div>

        <div class="calculator-body">

            <!-- STANDARD -->

            <div class="buttons standard-mode">

                <button class="clear">C</button>
                <button class="backspace">⌫</button>
                <button class="operator">%</button>
                <button class="operator">/</button>

                <button class="number">7</button>
                <button class="number">8</button>
                <button class="number">9</button>
                <button class="operator">*</button>

                <button class="number">4</button>
                <button class="number">5</button>
                <button class="number">6</button>
                <button class="operator">-</button>

                <button class="number">1</button>
                <button class="number">2</button>
                <button class="number">3</button>
                <button class="operator">+</button>

                <button class="number">0</button>
                <button class="number">.</button>
                <button class="equal">=</button>

            </div>

            <!-- SCIENTIFIC -->

            <div class="scientific-mode hidden">

                <button class="scientific">sin</button>
                <button class="scientific">cos</button>
                <button class="scientific">tan</button>

                <button class="scientific">asin</button>
                <button class="scientific">acos</button>
                <button class="scientific">atan</button>

                <button class="scientific">log</button>
                <button class="scientific">ln</button>
                <button class="scientific">π</button>

                <button class="scientific">e</button>
                <button class="scientific">√</button>
                <button class="scientific">x²</button>

                <button class="scientific">x³</button>
                <button class="scientific">^</button>
                <button class="scientific">!</button>

                <button class="scientific">(</button>
                <button class="scientific">)</button>
                <button class="scientific">|x|</button>

                <button class="scientific">1/x</button>
                <button class="scientific">EXP</button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
